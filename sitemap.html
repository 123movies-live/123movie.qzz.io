<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitemap - Browse All Movies & TV Shows - 123MOVIES</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Browse the complete catalog of movies and TV series available on 123MOVIES. Filter alphabetically and explore our library.">
    <meta name="keywords" content="sitemap, movie directory, 123movies, tv series directory, free movies list">
    <link rel="canonical" href="https://123movie.qzz.io/sitemap.html">
    
    <link rel="stylesheet" href="style.css?v=3.1">
    <style>
        .sitemap-container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 1.5rem;
        }
        
        .sitemap-header {
            text-align: center;
            margin-bottom: 3.5rem;
        }
        
        .sitemap-header h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        
        .sitemap-header p {
            color: var(--text-secondary);
            font-size: 1.15rem;
        }

        /* Alphabet Filter Row */
        .alphabet-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 3rem;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(15px);
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
            transform: translateY(-2px);
        }

        /* Grid link list */
        .sitemap-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
            margin-bottom: 3rem;
        }

        .sitemap-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .sitemap-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .sitemap-item img {
            width: 45px;
            height: 65px;
            object-fit: cover;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
        }

        .sitemap-item-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            overflow: hidden;
        }

        .sitemap-item-title {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sitemap-item-meta {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        /* Pagination section */
        .sitemap-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .pagination-info {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
                123M <div class="play-icon">▶</div> VIES
            </div>
            <div style="flex: 1;"></div>
            <div class="category-filter-container">
                <a href="index.html" class="category-dropdown-btn" style="text-decoration: none; display: flex; align-items: center;">
                    <span>Home Page</span>
                </a>
            </div>
        </div>
    </header>

    <main class="sitemap-container">
        <div class="sitemap-header">
            <h1>Browse Website Sitemap</h1>
            <p id="sitemapSubtitle">Explore our library of movies and TV series arranged alphabetically.</p>
        </div>

        <!-- Filter tabs -->
        <div class="alphabet-filter" id="alphabetFilter">
            <button class="filter-btn active" data-char="ALL">ALL</button>
            <button class="filter-btn" data-char="0-9">0-9</button>
            <button class="filter-btn" data-char="A">A</button>
            <button class="filter-btn" data-char="B">B</button>
            <button class="filter-btn" data-char="C">C</button>
            <button class="filter-btn" data-char="D">D</button>
            <button class="filter-btn" data-char="E">E</button>
            <button class="filter-btn" data-char="F">F</button>
            <button class="filter-btn" data-char="G">G</button>
            <button class="filter-btn" data-char="H">H</button>
            <button class="filter-btn" data-char="I">I</button>
            <button class="filter-btn" data-char="J">J</button>
            <button class="filter-btn" data-char="K">K</button>
            <button class="filter-btn" data-char="L">L</button>
            <button class="filter-btn" data-char="M">M</button>
            <button class="filter-btn" data-char="N">N</button>
            <button class="filter-btn" data-char="O">O</button>
            <button class="filter-btn" data-char="P">P</button>
            <button class="filter-btn" data-char="Q">Q</button>
            <button class="filter-btn" data-char="R">R</button>
            <button class="filter-btn" data-char="S">S</button>
            <button class="filter-btn" data-char="T">T</button>
            <button class="filter-btn" data-char="U">U</button>
            <button class="filter-btn" data-char="V">V</button>
            <button class="filter-btn" data-char="W">W</button>
            <button class="filter-btn" data-char="X">X</button>
            <button class="filter-btn" data-char="Y">Y</button>
            <button class="filter-btn" data-char="Z">Z</button>
        </div>

        <!-- Links Grid -->
        <div class="sitemap-list" id="sitemapList">
            <!-- Rendered dynamically -->
        </div>

        <!-- Pagination Controls -->
        <div class="sitemap-pagination" id="sitemapPagination">
            <button class="filter-btn" id="btnPrev" disabled>&larr; Previous</button>
            <span class="pagination-info" id="paginationInfo">Page 1 of 1</span>
            <button class="filter-btn" id="btnNext" disabled>Next &rarr;</button>
        </div>
    </main>

    <!-- Core Database array -->
    <script src="main.js?v=3.1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const listEl = document.getElementById('sitemapList');
            const alphabetFilter = document.getElementById('alphabetFilter');
            const paginationEl = document.getElementById('sitemapPagination');
            const paginationInfo = document.getElementById('paginationInfo');
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            const sitemapSubtitle = document.getElementById('sitemapSubtitle');

            let currentFilter = 'ALL';
            let currentPage = 1;
            const itemsPerPage = 120; // Show 120 items per page

            let filteredList = [];

            function updateFilters() {
                filteredList = MOVIE_DATABASE.filter(movie => {
                    if (!movie || !movie.title) return false;
                    const char = movie.title.trim().charAt(0).toUpperCase();

                    if (currentFilter === 'ALL') return true;
                    if (currentFilter === '0-9') return /^[0-9]/.test(char);
                    return char === currentFilter;
                });

                // Sort alphabetically
                filteredList.sort((a, b) => a.title.localeCompare(b.title));
                
                sitemapSubtitle.textContent = `Explore our library of ${MOVIE_DATABASE.length} items. Current filter has ${filteredList.length} matches.`;
                currentPage = 1;
                renderPage();
            }

            function renderPage() {
                listEl.innerHTML = '';
                
                const totalPages = Math.max(1, Math.ceil(filteredList.length / itemsPerPage));
                if (currentPage > totalPages) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;

                const startIdx = (currentPage - 1) * itemsPerPage;
                const endIdx = startIdx + itemsPerPage;
                const batch = filteredList.slice(startIdx, endIdx);

                if (batch.length === 0) {
                    listEl.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 3rem 0; font-size: 1.1rem;">No titles found matching letter "${currentFilter}".</div>`;
                    paginationEl.style.display = 'none';
                    return;
                }

                paginationEl.style.display = 'flex';
                paginationInfo.textContent = `Page ${currentPage} of ${totalPages}`;
                btnPrev.disabled = currentPage === 1;
                btnNext.disabled = currentPage === totalPages;

                batch.forEach(movie => {
                    const item = document.createElement('a');
                    item.href = movie.url;
                    item.className = 'sitemap-item';
                    
                    item.innerHTML = `
                        <img src="${movie.image}" alt="${movie.title}" loading="lazy">
                        <div class="sitemap-item-info">
                            <span class="sitemap-item-title">${movie.title}</span>
                            <span class="sitemap-item-meta">${movie.category}</span>
                        </div>
                    `;
                    listEl.appendChild(item);
                });
            }

            // Bind alphabet buttons
            alphabetFilter.addEventListener('click', (e) => {
                const btn = e.target.closest('.filter-btn');
                if (!btn) return;

                alphabetFilter.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                currentFilter = btn.getAttribute('data-char');
                updateFilters();
            });

            // Bind page buttons
            btnPrev.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderPage();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            // Bind next page button
            btnNext.addEventListener('click', () => {
                const totalPages = Math.ceil(filteredList.length / itemsPerPage);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderPage();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            // Initialize
            updateFilters();
        });
    </script>
</body>
</html>
