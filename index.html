    <style>
        /* Premium AdBlock UI */
        #adblockOverlay {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            background: rgba(5, 5, 5, 0.95) !important;
            backdrop-filter: blur(25px) saturate(180%) !important;
            z-index: 9999999 !important;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #adblockOverlay.active {
            display: flex !important;
            opacity: 1 !important;
        }

        .premium-popup {
            background: rgba(20, 20, 20, 0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 40px !important;
            padding: 4rem 3rem !important;
            max-width: 550px !important;
            width: 90% !important;
            text-align: center !important;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 
                        0 0 40px rgba(46, 204, 113, 0.1) !important;
            position: relative;
            overflow: hidden;
            transform: translateY(30px) scale(0.95);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #adblockOverlay.active .premium-popup {
            transform: translateY(0) scale(1) !important;
        }

        .premium-popup::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(46, 204, 113, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .block-icon-container {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--accent-color), #27ae60);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem;
            font-size: 3.5rem;
            box-shadow: 0 20px 40px rgba(46, 204, 113, 0.3);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .premium-popup h2 {
            font-size: 2.8rem !important;
            font-weight: 900 !important;
            margin-bottom: 1.5rem !important;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .premium-popup p {
            color: var(--text-secondary) !important;
            font-size: 1.2rem !important;
            line-height: 1.8 !important;
            margin-bottom: 3rem !important;
            padding: 0 1rem;
        }

        .btn-modern-refresh {
            background: #fff !important;
            color: #000 !important;
            border: none !important;
            padding: 1.2rem 3.5rem !important;
            border-radius: 100px !important;
            font-size: 1.1rem !important;
            font-weight: 900 !important;
            cursor: pointer !important;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            text-transform: uppercase !important;
            letter-spacing: 1.5px !important;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2) !important;
        }

        .btn-modern-refresh:hover {
            transform: scale(1.05) translateY(-3px) !important;
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.3) !important;

        }

        .content-blur-premium {
            filter: blur(20px) brightness(0.3) !important;
            pointer-events: none !important;
            transition: filter 1s ease !important;
        }
    </style>

    <script src="main.js?v=2.3"></script>

    <!-- Popup/Ad Focus Guard: ads open in background, this page stays active -->
    <script>
        (function () {
            var _origOpen = window.open;
            var _popupPending = false;

            // Override window.open so every popup/new tab opens in background
            window.open = function (url, target, features) {
                _popupPending = true;
                // Force noopener so new tab can't control this page
                var safeFeatures = (features || '') + ',noopener,noreferrer';
                var win = _origOpen.call(window, url, '_blank', safeFeatures);
                // Immediately steal focus back
                setTimeout(function () {
                    try { window.focus(); } catch (e) {}
                    _popupPending = false;
                }, 0);
                return win;
            };

            // If anything blurs this window (popup trying to take over), refocus
            window.addEventListener('blur', function () {
                if (_popupPending) {
                    setTimeout(function () {
                        try { window.focus(); } catch (e) {}
                    }, 50);
                }
            });

            // Block any attempt to navigate THIS page away via popups
            window.addEventListener('beforeunload', function (e) {
                if (_popupPending) {
                    e.preventDefault();
                    e.returnValue = '';
                }
            });
        })();
    </script>
